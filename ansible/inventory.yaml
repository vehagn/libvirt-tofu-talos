---
# Template — run `just configure` to generate inventory.local.yaml from setup.env.
# inventory.local.yaml is gitignored.
all:
  children:
    hypervisors:
      hosts:
        hypervisor-01:
          ansible_host: ${HYPERVISOR_HOST}
          ansible_user: ${HYPERVISOR_USER}
          # ansible_ssh_private_key_file: ~/.ssh/id_ed25519

      vars:
        ansible_python_interpreter: /usr/bin/python3
        # User to add to the libvirt group (defaults to ansible_user)
        libvirt_user: "{{ ansible_user }}"
