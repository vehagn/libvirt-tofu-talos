apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.19.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  # Pull kubeProxyReplacement, k8sServiceHost/Port, ipam.mode, and the VIP from
  # the ConfigMap written by the Talos inline-manifest bootstrap Job. This avoids
  # duplicating the VIP in the Git repo.
  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
      valuesKey: values.yaml
  values:
    operator:
      replicas: 1
    # Talos has an immutable root filesystem — /etc/sysctl.d/ does not exist.
    sysctlfix:
      enabled: false
    # Talos's container runtime does not grant capabilities unless explicitly listed.
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
